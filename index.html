. \u0422\u0430\u043c, \u043f\u043e \u0435\u0433\u043e \u0441\u043b\u043e\u0432\u0430\u043c, \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0435 \u0432\u043e\u0439\u0441\u043a\u0430 \u043d\u0430 12 \u043a\u043c \u043e\u0442\u043e\u0434\u0432\u0438\u043d\u0443\u043b\u0438 \u043b\u0438\u043d\u0438\u044e \u0444\u0440\u043e\u043d\u0442\u0430 \u043e\u0442 \u0433\u043e\u0440\u043e\u0434\u0430. \u041f\u0440\u0438 \u044d\u0442\u043e\u043c \u0412\u0421\u0423 \u0430\u043a\u0442\u0438\u0432\u043d\u043e \u043a\u043e\u043d\u0442\u0440\u0430\u0442\u0430\u043a\u043e\u0432\u0430\u043b\u0438, \u0447\u0442\u043e\u0431\u044b \u043d\u0435 \u0434\u043e\u043f\u0443\u0441\u0442\u0438\u0442\u044c \u043f\u0440\u043e\u0434\u0432\u0438\u0436\u0435\u043d\u0438\u044f \u0437\u0434\u0435\u0441\u044c \u0447\u0430\u0441\u0442\u0435\u0439 \u0438 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0439 3-\u0439 \u0433\u0432\u0430\u0440\u0434\u0435\u0439\u0441\u043a\u043e\u0439 \u043e\u0431\u0449\u0435\u0432\u043e\u0439\u0441\u043a\u043e\u0432\u043e\u0439 \u0430\u0440\u043c\u0438\u0438. \u041f\u0440\u0438\u043c\u0435\u0447\u0430\u0442\u0435\u043b\u044c\u043d\u043e, \u0447\u0442\u043e \u0443 \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u044f \u0412\u0421 \u0420\u0424 \u043f\u043e\u044f\u0432\u0438\u043b\u043e\u0441\u044c \u043d\u043e\u0432\u043e\u0435 \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u2013 \u00ab\u0421\u043b\u0430\u0432\u044f\u043d\u0441\u043a\u043e-\u041a\u0440\u0430\u043c\u0430\u0442\u043e\u0440\u0441\u043a\u043e-\u041a\u043e\u043d\u0441\u0442\u0430\u043d\u0442\u0438\u043d\u043e\u0432\u0441\u043a\u0438\u0439 \u0443\u043a\u0440\u0435\u043f\u0440\u0430\u0439\u043e\u043d\u00bb, \u0445\u043e\u0442\u044f \u0435\u0449\u0435 \u043d\u0435\u0434\u0430\u0432\u043d\u043e \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043b\u043e\u0441\u044c \u00ab\u0430\u0433\u043b\u043e\u043c\u0435\u0440\u0430\u0446\u0438\u044f\u00bb. \u0421 \u0442\u043e\u0447\u043a\u0438 \u0437\u0440\u0435\u043d\u0438\u044f \u0432\u043e\u0435\u043d\u043d\u043e\u0433\u043e \u0434\u0435\u043b\u0430 \u2013 \u00ab\u0430\u0433\u043b\u043e\u043c\u0435\u0440\u0430\u0446\u0438\u044e\u00bb, \u043a\u0430\u043a \u0441\u043a\u043e\u043f\u043b\u0435\u043d\u0438\u0435 \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0435\u043d\u043d\u044b\u0445 \u043d\u0430\u0441\u0435\u043b\u0435\u043d\u043d\u044b\u0445 \u043f\u0443\u043d\u043a\u0442\u043e\u0432 \u2013 \u00ab\u043e\u0441\u0432\u043e\u0431\u043e\u0436\u0434\u0430\u044e\u0442\u00bb. \u0410 \u0432\u043e\u0442 \u00ab\u0443\u043a\u0440\u0435\u043f\u0440\u0430\u0439\u043e\u043d\u00bb \u2013 \u00ab\u0437\u0430\u0445\u0432\u0430\u0442\u044b\u0432\u0430\u044e\u0442\u00bb \u0438\u043b\u0438 \u00ab\u0443\u043d\u0438\u0447\u0442\u043e\u0436\u0430\u044e\u0442\u00bb. \u041d\u0430 \u043f\u0435\u0440\u0432\u044b\u0439 \u0432\u0437\u0433\u043b\u044f\u0434, \u044d\u0442\u043e \u0442\u043e\u043b\u044c\u043a\u043e \u0441\u043b\u043e\u0432\u0430, \u043d\u043e \u043d\u0430 \u0441\u0430\u043c\u043e\u043c \u0434\u0435\u043b\u0435 \u2013 \u00ab\u0437\u0430\u0445\u0432\u0430\u0442\u00bb \u0438 \u00ab\u043e\u0441\u0432\u043e\u0431\u043e\u0436\u0434\u0435\u043d\u0438\u0435\u00bb \u043f\u0440\u0435\u0434\u0443\u0441\u043c\u0430\u0442\u0440\u0438\u0432\u0430\u044e\u0442 \u0441\u043e\u0432\u0435\u0440\u0448\u0435\u043d\u043d\u043e\u0439 \u0438\u043d\u043e\u0439 \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439 \u0438 \u0431\u043e\u0435\u0432\u043e\u0433\u043e \u043f\u043b\u0430\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f. \u041c\u0435\u0436\u0434\u0443 \u0442\u0435\u043c \u0431\u043e\u0439\u0446\u044b, \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0449\u0438\u0435 \u043d\u0430 \u044d\u0442\u043e\u043c \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0438, \u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0430\u044e\u0442, \u0447\u0442\u043e \u0443 \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0445 \u0432\u043e\u0439\u0441\u043a \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0442\u0435\u043b\u044c\u043d\u043e \u0435\u0441\u0442\u044c \u0441\u0435\u0440\u044c\u0435\u0437\u043d\u044b\u0435 \u0443\u0441\u043f\u0435\u0445\u0438 \u043d\u0430 \u0421\u0435\u0432\u0435\u0440\u0441\u043a\u043e\u043c \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0438.<br/><br/>\u041a\u0430\u043a \u043c\u044b \u043f\u043e\u043c\u043d\u0438\u043c, \u0443\u043a\u0440\u0430\u0438\u043d\u0441\u043a\u0438\u0439 \u043f\u043b\u0430\u043d \u00ab\u0431\u0438\u0442\u0432\u044b \u0437\u0430 \u0414\u043e\u043d\u0431\u0430\u0441\u0441 2.0\u00bb \u043f\u043e\u0434\u0440\u0430\u0437\u0443\u043c\u0435\u0432\u0430\u043b, \u0447\u0442\u043e \u0412\u0421 \u0420\u0424 \u0431\u0443\u0434\u0443\u0442 \u043e\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u044b \u0438 \u043e\u0431\u0435\u0441\u043a\u0440\u043e\u0432\u043b\u0435\u043d\u044b \u043d\u0430 \u043b\u0438\u043d\u0438\u0438 \u0421\u0432\u044f\u0442\u043e\u0433\u043e\u0440\u0441\u043a-\u041b\u0438\u043c\u0430\u043d-\u042f\u043c\u043f\u043e\u043b\u044c-\u0421\u0435\u0432\u0435\u0440\u0441\u043a. \u041d\u043e \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u043e\u0435 \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u0435\u0440\u0435\u0438\u0433\u0440\u0430\u043b\u043e \u043f\u0440\u043e\u0442\u0438\u0432\u043d\u0438\u043a\u0430, \u0438 \u0432 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0435 \u0443\u0436\u0435 \u043a \u043a\u043e\u043d\u0446\u0443 \u043f\u0440\u043e\u0448\u043b\u043e\u0433\u043e \u0433\u043e\u0434\u0430 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u043f\u0440\u043e\u0440\u0432\u0430\u0442\u044c \u044d\u0442\u043e\u0442 \u0431\u0430\u0440\u044c\u0435\u0440. \u0412 \u0442\u043e\u043c \u0447\u0438\u0441\u043b\u0435 \u043f\u043e\u0434 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0412\u0421 \u0420\u0424 \u043f\u0435\u0440\u0435\u0448\u043b\u0438 \u0421\u0435\u0432\u0435\u0440\u0441\u043a \u0438 \u042f\u043c\u043f\u043e\u043b\u044c. \u0422\u0430\u043a\u0436\u0435 \u0447\u0430\u0441\u0442\u0438 \u0438 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f 3-\u0439 \u0433\u0432\u0430\u0440\u0434\u0435\u0439\u0441\u043a\u043e\u0439 \u0438 25-\u0439 \u043e\u0431\u0449\u0435\u0432\u043e\u0439\u0441\u043a\u043e\u0432\u044b\u0445 \u0430\u0440\u043c\u0438\u0439 \u0432\u043e\u0448\u043b\u0438 \u0432 \u041b\u0438\u043c\u0430\u043d (\u041a\u0440\u0430\u0441\u043d\u044b\u0439 \u041b\u0438\u043c\u0430\u043d) \u0438 \u0437\u0430\u0432\u044f\u0437\u0430\u043b\u0438 \u0431\u043e\u0438 \u043d\u0430 \u043f\u043e\u0434\u0441\u0442\u0443\u043f\u0430\u0445 \u043a \u0421\u0432\u044f\u0442\u043e\u0433\u043e\u0440\u0441\u043a\u0443. \u041f\u0440\u0438\u0447\u0435\u043c  \u00ab\u0437\u0430\u043f\u0430\u0434\u043d\u044b\u0435\u00bb \u043d\u0430 \u044d\u0442\u043e\u043c \u043d\u0435 \u043e\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u043b\u0438\u0441\u044c \u0438 \u0432 \u0440\u0430\u0439\u043e\u043d\u0435 \u041b\u0438\u043c\u0430\u043d\u0430 \u043f\u0440\u043e\u0440\u0432\u0430\u043b\u0438\u0441\u044c \u0432\u0433\u043b\u0443\u0431\u044c \u0443\u043a\u0440\u0430\u0438\u043d\u0441\u043a\u043e\u0439 \u043e\u0431\u043e\u0440\u043e\u043d\u044b. \u041d\u043e \u0441 \u043d\u0430\u0447\u0430\u043b\u043e\u043c \u043d\u044b\u043d\u0435\u0448\u043d\u0435\u0433\u043e \u0433\u043e\u0434\u0430 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u0434\u043b\u044f \u0412\u0421\u0423 \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u043e \u0441\u0442\u0430\u0431\u0438\u043b\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u043b\u0430\u0441\u044c. \u0423\u043a\u0440\u0430\u0438\u043d\u0441\u043a\u043e\u0435 \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u0435 \u0443\u043c\u0435\u043b\u043e \u0432\u043e\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043b\u043e\u0441\u044c \u0440\u0435\u043b\u044c\u0435\u0444\u043e\u043c \u043c\u0435\u0441\u0442\u043d\u043e\u0441\u0442\u0438 \u0438 \u0441\u043c\u043e\u0433\u043b\u043e \u043e\u043f\u0435\u0440\u0430\u0442\u0438\u0432\u043d\u043e \u0432\u044b\u0441\u0442\u0440\u043e\u0438\u0442\u044c \u043e\u0431\u043e\u0440\u043e\u043d\u0443. \u0421\u043b\u0435\u0434\u0443\u0435\u0442 \u043e\u0442\u043c\u0435\u0442\u0438\u0442\u044c, \u0447\u0442\u043e \u043f\u0440\u043e\u0431\u0438\u0432\u0430\u0442\u044c\u0441\u044f \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u043c \u0432\u043e\u0439\u0441\u043a\u0430\u043c \u043f\u0440\u0438\u0445\u043e\u0434\u0438\u0442\u0441\u044f \u0447\u0435\u0440\u0435\u0437 \u043c\u0435\u0448\u0430\u043d\u0438\u043d\u0443 \u0438\u0437 \u0432\u043e\u0437\u0432\u044b...<br/>**************************************<br/>**************************************<br/><br/>\u041f\u043e\u043b\u043d\u0430\u044f \u0432\u0435\u0440\u0441\u0438\u044f \u0434\u043e\u0441\u0442\u0443\u043f\u043d\u0430 \u0432 \u0437\u0430\u043a\u0440\u044b\u0442\u043e\u043c \u043a\u0430\u043d\u0430\u043b\u0435 \u043f\u043e \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0435 \u0441 \u043f\u043e\u043c\u043e\u0449\u044c\u044e <a href=\"https://t.me/DvaaPayBot\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\" rel=\"noopener\" target=\"_blank\">\u0431\u043e\u0442\u0430</a>", "text_plain": "\u0412\u0447\u0435\u0440\u0430 \u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u043e\u0433\u043e \u0433\u0435\u043d\u0435\u0440\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0448\u0442\u0430\u0431\u0430 \u2013 \u043a\u043e\u043c\u0430\u043d\u0434\u0443\u044e\u0449\u0438\u0439 \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0435\u043d\u043d\u043e\u0439 \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432\u043a\u043e\u0439  \u0432\u043e\u0439\u0441\u043a \u0438 \u0441\u0438\u043b \u0432 \u0437\u043e\u043d\u0435 \u0421\u043f\u0435\u0446\u0438\u0430\u043b\u044c\u043d\u043e\u0439 \u0432\u043e\u0435\u043d\u043d\u043e\u0439 \u043e\u043f\u0435\u0440\u0430\u0446\u0438\u0438 \u0433\u0435\u043d\u0435\u0440\u0430\u043b \u0430\u0440\u043c\u0438\u0438 \u0412\u0430\u043b\u0435\u0440\u0438\u0439 \u0413\u0435\u0440\u0430\u0441\u0438\u043c\u043e\u0432 \u043f\u043e\u0441\u0435\u0442\u0438\u043b \u043a\u043e\u043c\u0430\u043d\u0434\u043d\u044b\u0439 \u043f\u0443\u043d\u043a\u0442 \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432\u043a\u0438 \u00ab\u042e\u0436\u043d\u0430\u044f\u00bb. \u0412 \u0441\u0432\u043e\u0435\u043c \u0432\u044b\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u0438 \u0432\u043e\u0435\u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a, \u0432 \u0447\u0430\u0441\u0442\u043d\u043e\u0441\u0442\u0438, \u0443\u043f\u043e\u043c\u044f\u043d\u0443\u043b \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0443 \u043d\u0430 \u0421\u0435\u0432\u0435\u0440\u0441\u043a\u043e\u043c \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0438. \u0422\u0430\u043c, \u043f\u043e \u0435\u0433\u043e \u0441\u043b\u043e\u0432\u0430\u043c, \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0435 \u0432\u043e\u0439\u0441\u043a\u0430 \u043d\u0430 12 \u043a\u043c \u043e\u0442\u043e\u0434\u0432\u0438\u043d\u0443\u043b\u0438 \u043b\u0438\u043d\u0438\u044e \u0444\u0440\u043e\u043d\u0442\u0430 \u043e\u0442 \u0433\u043e\u0440\u043e\u0434\u0430. \u041f\u0440\u0438 \u044d\u0442\u043e\u043c \u0412\u0421\u0423 \u0430\u043a\u0442\u0438\u0432\u043d\u043e \u043a\u043e\u043d\u0442\u0440\u0430\u0442\u0430\u043a\u043e\u0432\u0430\u043b\u0438, \u0447\u0442\u043e\u0431\u044b \u043d\u0435 \u0434\u043e\u043f\u0443\u0441\u0442\u0438\u0442\u044c \u043f\u0440\u043e\u0434\u0432\u0438\u0436\u0435\u043d\u0438\u044f \u0437\u0434\u0435\u0441\u044c \u0447\u0430\u0441\u0442\u0435\u0439 \u0438 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0439 3-\u0439 \u0433\u0432\u0430\u0440\u0434\u0435\u0439\u0441\u043a\u043e\u0439 \u043e\u0431\u0449\u0435\u0432\u043e\u0439\u0441\u043a\u043e\u0432\u043e\u0439 \u0430\u0440\u043c\u0438\u0438. \u041f\u0440\u0438\u043c\u0435\u0447\u0430\u0442\u0435\u043b\u044c\u043d\u043e, \u0447\u0442\u043e \u0443 \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u044f \u0412\u0421 \u0420\u0424 \u043f\u043e\u044f\u0432\u0438\u043b\u043e\u0441\u044c \u043d\u043e\u0432\u043e\u0435 \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u2013 \u00ab\u0421\u043b\u0430\u0432\u044f\u043d\u0441\u043a\u043e-\u041a\u0440\u0430\u043c\u0430\u0442\u043e\u0440\u0441\u043a\u043e-\u041a\u043e\u043d\u0441\u0442\u0430\u043d\u0442\u0438\u043d\u043e\u0432\u0441\u043a\u0438\u0439 \u0443\u043a\u0440\u0435\u043f\u0440\u0430\u0439\u043e\u043d\u00bb, \u0445\u043e\u0442\u044f \u0435\u0449\u0435 \u043d\u0435\u0434\u0430\u0432\u043d\u043e \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043b\u043e\u0441\u044c \u00ab\u0430\u0433\u043b\u043e\u043c\u0435\u0440\u0430\u0446\u0438\u044f\u00bb. \u0421 \u0442\u043e\u0447\u043a\u0438 \u0437\u0440\u0435\u043d\u0438\u044f \u0432\u043e\u0435\u043d\u043d\u043e\u0433\u043e \u0434\u0435\u043b\u0430 \u2013 \u00ab\u0430\u0433\u043b\u043e\u043c\u0435\u0440\u0430\u0446\u0438\u044e\u00bb, \u043a\u0430\u043a \u0441\u043a\u043e\u043f\u043b\u0435\u043d\u0438\u0435 \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0435\u043d\u043d\u044b\u0445 \u043d\u0430\u0441\u0435\u043b\u0435\u043d\u043d\u044b\u0445 \u043f\u0443\u043d\u043a\u0442\u043e\u0432 \u2013 \u00ab\u043e\u0441\u0432\u043e\u0431\u043e\u0436\u0434\u0430\u044e\u0442\u00bb. \u0410 \u0432\u043e\u0442 \u00ab\u0443\u043a\u0440\u0435\u043f\u0440\u0430\u0439\u043e\u043d\u00bb \u2013 \u00ab\u0437\u0430\u0445\u0432\u0430\u0442\u044b\u0432\u0430\u044e\u0442\u00bb \u0438\u043b\u0438 \u00ab\u0443\u043d\u0438\u0447\u0442\u043e\u0436\u0430\u044e\u0442\u00bb. \u041d\u0430 \u043f\u0435\u0440\u0432\u044b\u0439 \u0432\u0437\u0433\u043b\u044f\u0434, \u044d\u0442\u043e \u0442\u043e\u043b\u044c\u043a\u043e \u0441\u043b\u043e\u0432\u0430, \u043d\u043e \u043d\u0430 \u0441\u0430\u043c\u043e\u043c \u0434\u0435\u043b\u0435 \u2013 \u00ab\u0437\u0430\u0445\u0432\u0430\u0442\u00bb \u0438 \u00ab\u043e\u0441\u0432\u043e\u0431\u043e\u0436\u0434\u0435\u043d\u0438\u0435\u00bb \u043f\u0440\u0435\u0434\u0443\u0441\u043c\u0430\u0442\u0440\u0438\u0432\u0430\u044e\u0442 \u0441\u043e\u0432\u0435\u0440\u0448\u0435\u043d\u043d\u043e\u0439 \u0438\u043d\u043e\u0439 \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439 \u0438 \u0431\u043e\u0435\u0432\u043e\u0433\u043e \u043f\u043b\u0430\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f. \u041c\u0435\u0436\u0434\u0443 \u0442\u0435\u043c \u0431\u043e\u0439\u0446\u044b, \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0449\u0438\u0435 \u043d\u0430 \u044d\u0442\u043e\u043c \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0438, \u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0430\u044e\u0442, \u0447\u0442\u043e \u0443 \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0445 \u0432\u043e\u0439\u0441\u043a \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0442\u0435\u043b\u044c\u043d\u043e \u0435\u0441\u0442\u044c \u0441\u0435\u0440\u044c\u0435\u0437\u043d\u044b\u0435 \u0443\u0441\u043f\u0435\u0445\u0438 \u043d\u0430 \u0421\u0435\u0432\u0435\u0440\u0441\u043a\u043e\u043c \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0438. \u041a\u0430\u043a \u043c\u044b \u043f\u043e\u043c\u043d\u0438\u043c, \u0443\u043a\u0440\u0430\u0438\u043d\u0441\u043a\u0438\u0439 \u043f\u043b\u0430\u043d \u00ab\u0431\u0438\u0442\u0432\u044b \u0437\u0430 \u0414\u043e\u043d\u0431\u0430\u0441\u0441 2.0\u00bb \u043f\u043e\u0434\u0440\u0430\u0437\u0443\u043c\u0435\u0432\u0430\u043b, \u0447\u0442\u043e \u0412\u0421 \u0420\u0424 \u0431\u0443\u0434\u0443\u0442 \u043e\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u044b \u0438 \u043e\u0431\u0435\u0441\u043a\u0440\u043e\u0432\u043b\u0435\u043d\u044b \u043d\u0430 \u043b\u0438\u043d\u0438\u0438 \u0421\u0432\u044f\u0442\u043e\u0433\u043e\u0440\u0441\u043a-\u041b\u0438\u043c\u0430\u043d-\u042f\u043c\u043f\u043e\u043b\u044c-\u0421\u0435\u0432\u0435\u0440\u0441\u043a. \u041d\u043e \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u043e\u0435 \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u0435\u0440\u0435\u0438\u0433\u0440\u0430\u043b\u043e \u043f\u0440\u043e\u0442\u0438\u0432\u043d\u0438\u043a\u0430, \u0438 \u0432 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0435 \u0443\u0436\u0435 \u043a \u043a\u043e\u043d\u0446\u0443 \u043f\u0440\u043e\u0448\u043b\u043e\u0433\u043e \u0433\u043e\u0434\u0430 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u043f\u0440\u043e\u0440\u0432\u0430\u0442\u044c \u044d\u0442\u043e\u0442 \u0431\u0430\u0440\u044c\u0435\u0440. \u0412 \u0442\u043e\u043c \u0447\u0438\u0441\u043b\u0435 \u043f\u043e\u0434 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0412\u0421 \u0420\u0424 \u043f\u0435\u0440\u0435\u0448\u043b\u0438 \u0421\u0435\u0432\u0435\u0440\u0441\u043a \u0438 \u042f\u043c\u043f\u043e\u043b\u044c. \u0422\u0430\u043a\u0436\u0435 \u0447\u0430\u0441\u0442\u0438 \u0438 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f 3-\u0439 \u0433\u0432\u0430\u0440\u0434\u0435\u0439\u0441\u043a\u043e\u0439 \u0438 25-\u0439 \u043e\u0431\u0449\u0435\u0432\u043e\u0439\u0441\u043a\u043e\u0432\u044b\u0445 \u0430\u0440\u043c\u0438\u0439 \u0432\u043e\u0448\u043b\u0438 \u0432 \u041b\u0438\u043c\u0430\u043d (\u041a\u0440\u0430\u0441\u043d\u044b\u0439 \u041b\u0438\u043c\u0430\u043d) \u0438 \u0437\u0430\u0432\u044f\u0437\u0430\u043b\u0438 \u0431\u043e\u0438 \u043d\u0430 \u043f\u043e\u0434\u0441\u0442\u0443\u043f\u0430\u0445 \u043a \u0421\u0432\u044f\u0442\u043e\u0433\u043e\u0440\u0441\u043a\u0443. \u041f\u0440\u0438\u0447\u0435\u043c  \u00ab\u0437\u0430\u043f\u0430\u0434\u043d\u044b\u0435\u00bb \u043d\u0430 \u044d\u0442\u 35 \u041a\u0440\u0438\u0442 (\u0413\u0440\u0435\u0446\u0438\u044f).<br/><br/>\u2014 \u042d\u0442\u043e\u0442 \u043a\u043e\u0440\u0430\u0431\u043b\u044c \u043d\u0430\u0445\u043e\u0434\u0438\u043b\u0441\u044f \u0432 \u043c\u0438\u0441\u0441\u0438\u0438 \u0432 \u0442\u0435\u0447\u0435\u043d\u0438\u0435 9 \u043c\u0435\u0441\u044f\u0446\u0435\u0432 \u0438 \u0434\u043e \u043f\u0440\u0438\u0431\u044b\u0442\u0438\u044f \u043d\u0430 \u0411\u043b\u0438\u0436\u043d\u0438\u0439 \u0412\u043e\u0441\u0442\u043e\u043a \u0443\u0447\u0430\u0441\u0442\u0432\u043e\u0432\u0430\u043b \u0432 \u043e\u043f\u0435\u0440\u0430\u0446\u0438\u044f\u0445 \u043f\u0440\u043e\u0442\u0438\u0432 \u0412\u0435\u043d\u0435\u0441\u0443\u044d\u043b\u044b \u0432 \u041a\u0430\u0440\u0438\u0431\u0441\u043a\u043e\u043c \u043c\u043e\u0440\u0435. \u0414\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u043f\u0435\u0440\u0438\u043e\u0434 \u043f\u0440\u0435\u0431\u044b\u0432\u0430\u043d\u0438\u044f \u0432\u044b\u0437\u044b\u0432\u0430\u0435\u0442 \u0432\u043e\u043f\u0440\u043e\u0441\u044b \u043e \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e\u043c \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0438 \u044d\u043a\u0438\u043f\u0430\u0436\u0430 \u0438 \u0431\u043e\u0435\u0432\u043e\u0439 \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438 \u0430\u0432\u0438\u0430\u043d\u043e\u0441\u0446\u0430.", "text_plain": "\u0411\u0435\u0433\u0441\u0442\u0432\u043e \u0430\u0432\u0438\u0430 \u043d\u0435\u0441\u0443\u0449\u0435\u0439 \u0433\u0440\u0443\u043f\u043f\u044b USS Gerald FORD \u0438\u0437 \u0417\u0430\u043b\u0438\u0432\u0430 .  \u2014 \u0410\u043c\u0435\u0440\u0438\u043a\u0430\u043d\u0441\u043a\u0438\u0435 \u0432\u043b\u0430\u0441\u0442\u0438 \u0441\u043e\u043e\u0431\u0449\u0438\u043b\u0438, \u0447\u0442\u043e \u043e\u0436\u0438\u0434\u0430\u0435\u0442\u0441\u044f \u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e\u0435 \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0435\u043d\u0438\u0435 \u0430\u0432\u0438\u0430\u043d\u043e\u0441\u0446\u0430 \u00ab\u0414\u0436\u0435\u0440\u0430\u043b\u044c\u0434 \u0420. \u0424\u043e\u0440\u0434\u00bb, \u043a\u043e\u0442\u043e\u0440\u044b\u0439 \u0431\u044b\u043b \u0437\u0430\u0434\u0435\u0439\u0441\u0442\u0432\u043e\u0432\u0430\u043d \u0432 \u043e\u043f\u0435\u0440\u0430\u0446\u0438\u044f\u0445 \u043f\u0440\u043e\u0442\u0438\u0432 \u0418\u0440\u0430\u043d\u0430, \u0432 \u043f\u043e\u0440\u0442 \u043f\u043e\u0441\u043b\u0435 \u043f\u043e\u0436\u0430\u0440\u0430 \u043d\u0430 \u043f\u0430\u043b\u0443\u0431\u0435. \u2014 \u0410\u0433\u0435\u043d\u0442\u0441\u0442\u0432\u043e Reuters \u0438 Bloomberg \u0441\u043e\u043e\u0431\u0449\u0438\u043b\u0438, \u0447\u0442\u043e \u044d\u0442\u043e\u0442 \u0430\u0432\u0438\u0430\u043d\u043e\u0441\u0435\u0446, \u044f\u0432\u043b\u044f\u044e\u0449\u0438\u0439\u0441\u044f \u043d\u043e\u0432\u0435\u0439\u0448\u0438\u043c \u0430\u0432\u0438\u0430\u043d\u043e\u0441\u0446\u0435\u043c \u0421\u0428\u0410 \u0438 \u043a\u0440\u0443\u043f\u043d\u0435\u0439\u0448\u0438\u043c \u0430\u0432\u0438\u0430\u043d\u043e\u0441\u0446\u0435\u043c \u0432 \u043c\u0438\u0440\u0435, \u0432 \u043d\u0430\u0441\u0442\u043e\u044f\u0449\u0435\u0435 \u0432\u0440\u0435\u043c\u044f \u043d\u0430\u0445\u043e\u0434\u0438\u0442\u0441\u044f \u0432 \u041a\u0440\u0430\u0441\u043d\u043e\u043c \u043c\u043e\u0440\u0435. \u041f\u043e \u0441\u043b\u043e\u0432\u0430\u043c \u0434\u0432\u0443\u0445 \u043e\u0441\u0432\u0435\u0434\u043e\u043c\u043b\u0435\u043d\u043d\u044b\u0445 \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u043e\u0432, \u043e\u0436\u0438\u0434\u0430\u0435\u0442\u0441\u044f, \u0447\u0442\u043e \u043a\u043e\u0440\u0430\u0431\u043b\u044c \u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e \u043d\u0430\u043f\u0440\u0430\u0432\u0438\u0442\u0441\u044f \u0432 \u0437\u0430\u043b\u0438\u0432 \u0421\u0443\u0434\u0430 \u043d\u0430 \u043e\u0441\u0442\u0440\u043e\u0432\u0435 \u041a\u0440\u0438\u0442 (\u0413\u0440\u0435\u0446\u0438\u044f). \u2014 \u042 430\u0434\u0430 \u043f\u043e\u0441\u0435\u0442\u0438\u043b\u0438 \u042d\u0440-\u0420\u0438\u044f\u0434 \u043d\u0430 \u0444\u043e\u043d\u0435 \u0440\u0430\u0441\u0442\u0443\u0449\u0435\u0439 \u043d\u0430\u043f\u0440\u044f\u0436\u0451\u043d\u043d\u043e\u0441\u0442\u0438, \u0441\u0432\u044f\u0437\u0430\u043d\u043d\u043e\u0439 \u0441 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u043c \u0432\u043e\u043a\u0440\u0443\u0433 \u0418\u0440\u0430\u043d\u0430. \u041f\u0440\u0435\u043c\u044c\u0435\u0440-\u043c\u0438\u043d\u0438\u0441\u0442\u0440 \u0438 \u0444\u0435\u043b\u044c\u0434\u043c\u0430\u0440\u0448\u0430\u043b \u0431\u044b\u043b\u0438 \u0447\u0430\u0441\u0442\u044c\u044e \u044d\u0442\u0438\u0445 \u0432\u0430\u0436\u043d\u044b\u0445 \u0432\u0441\u0442\u0440\u0435\u0447. \u0421\u043e\u043e\u0431\u0449\u0430\u0435\u0442\u0441\u044f, \u0447\u0442\u043e \u0421\u0430\u0443\u0434\u043e\u0432\u0441\u043a\u0430\u044f \u0410\u0440\u0430\u0432\u0438\u044f \u0433\u043e\u0442\u043e\u0432\u0430 \u043f\u0440\u0435\u0434\u043e\u0441\u0442\u0430\u0432\u0438\u0442\u044c \u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d\u0443 \u044d\u043a\u043e\u043d\u043e\u043c\u0438\u0447\u0435\u0441\u043a\u0443\u044e \u043f\u043e\u043c\u043e\u0449\u044c \u0432 \u0440\u0430\u0437\u043c\u0435\u0440\u0435 \u0434\u043e 10 \u043c\u043b\u0440\u0434 \u0434\u043e\u043b\u043b., \u0435\u0441\u043b\u0438 \u0418\u0441\u043b\u0430\u043c\u0430\u0431\u0430\u0434 \u0441\u043e\u0433\u043b\u0430\u0441\u0438\u0442\u0441\u044f \u0440\u0430\u0437\u043c\u0435\u0441\u0442\u0438\u0442\u044c \u0438\u0441\u0442\u0440\u0435\u0431\u0438\u0442\u0435\u043b\u0438 \u0438 \u043b\u0438\u0447\u043d\u044b\u0439 \u0441\u043e\u0441\u0442\u0430\u0432 \u0432 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0443 \u0441\u043e\u0432\u043c\u0435\u0441\u0442\u043d\u043e\u0439 \u043a\u0430\u043c\u043f\u0430\u043d\u0438\u0438 \u043f\u0440\u043e\u0442\u0438\u0432 \u0422\u0435\u0433\u0435\u0440\u0430\u043d\u0430 \u0432 \u0441\u043b\u0443\u0447\u0430\u0435 \u044d\u0441\u043a\u0430\u043b\u0430\u0446\u0438\u0438 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430.<br/><br/>\u041f\u043e\u043a\u0430 \u0447\u0442\u043e \u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d \u0441\u043e\u043f\u0440\u043e\u0442\u0438\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u044d\u0442\u043e\u043c\u0443 \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u044e, \u0432\u043c\u0435\u0441\u0442\u043e \u044d\u0442\u043e\u0433\u043e \u043f\u0440\u0438\u0437\u044b\u0432\u0430\u044f \u042d\u0440-\u0420\u0438\u044f\u0434 \u0432\u0435\u0441\u0442\u0438 \u0434\u0438\u043f\u043b\u043e\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043f\u0435\u0440\u0435\u0433\u043e\u0432\u043e\u0440\u044b \u0441 \u0418\u0440\u0430\u043d\u043e\u043c \u0438 \u0438\u0433\u0440\u0430\u0442\u044c \u0440\u043e\u043b\u044c \u0432 \u0437\u0430\u043a\u0443\u043b\u0438\u0441\u043d\u043e\u043c \u043f\u043e\u0441\u0440\u0435\u0434\u043d\u0438\u0447\u0435\u0441\u0442\u0432\u0435 \u043c\u0435\u0436\u0434\u0443 \u0434\u0432\u0443\u043c\u044f \u0441\u0442\u043e\u0440\u043e\u043d\u0430\u043c\u0438. \u041e\u0434\u043d\u0430\u043a\u043e \u043d\u0435\u0434\u0430\u0432\u043d\u0438\u0435 \u0440\u0430\u043a\u0435\u0442\u043d\u044b\u0435 \u0443\u0434\u0430\u0440\u044b \u0432 \u042d\u0440-\u0420\u0438\u044f\u0434\u0435 \u0443\u0441\u0438\u043b\u0438\u043b\u0438 \u0441\u0440\u043e\u0447\u043d\u043e\u0441\u0442\u044c, \u043f\u043e\u0432\u044b\u0441\u0438\u0432 \u0432\u0435\u0440\u043e\u044f\u0442\u043d\u043e\u0441\u0442\u044c \u043f\u0440\u044f\u043c\u044b\u0445 \u0432\u043e\u0435\u043d\u043d\u044b\u0445 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439 \u0421\u0430\u0443\u0434\u043e\u0432\u0441\u043a\u043e\u0439 \u0410\u0440\u0430\u0432\u0438\u0438. \u0412 \u0442\u0430\u043a\u043e\u043c \u0441\u043b\u0443\u0447\u0430\u0435 \u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d \u043c\u043e\u0436\u0435\u0442 \u0441\u0442\u043e\u043b\u043a\u043d\u0443\u0442\u044c\u0441\u044f \u0441 \u0440\u0430\u0441\u0442\u0443\u0449\u0438\u043c \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u0435\u043c \u043f\u043e \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044e \u0441\u0432\u043e\u0438\u0445 \u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u044c\u0441\u0442\u0432 \u0432 \u0441\u0444\u0435\u0440\u0435 \u043e\u0431\u043e\u0440\u043e\u043d\u044b.<br/><br/>\u0412 \u0442\u043e \u0436\u0435 \u0432\u0440\u0435\u043c\u044f \u043d\u0435\u0434\u0430\u0432\u043d\u0438\u0435 \u0436\u0435\u0441\u0442\u044b \u0434\u043e\u0431\u0440\u043e\u0439 \u0432\u043e\u043b\u0438 \u0418\u0440\u0430\u043d\u0430 \u0432 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u0438 \u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d\u0430, \u043f\u043e\u0445\u043e\u0436\u0435, \u0441\u0438\u0433\u043d\u0430\u043b\u0438\u0437\u0438\u0440\u0443\u044e\u0442 \u043e \u0442\u043e\u043c, \u0447\u0442\u043e \u0422\u0435\u0433\u0435\u0440\u0430\u043d \u043e\u0436\u0438\u0434\u0430\u0435\u0442, \u0447\u0442\u043e \u0418\u0441\u043b\u0430\u043c\u0430\u0431\u0430\u0434 \u0441\u043e\u0445\u0440\u0430\u043d\u0438\u0442 \u043d\u0435\u0439\u0442\u0440\u0430\u043b\u0438\u0442\u0435\u0442 \u0438 \u0438\u0437\u0431\u0435\u0436\u0438\u0442 \u043f\u0440\u0438\u0441\u043e\u0435\u0434\u0438\u043d\u0435\u043d\u0438\u044f \u043a \u043b\u044e\u0431\u043e\u0439 \u0430\u043d\u0442\u0438\u0438\u0440\u0430\u043d\u0441\u043a\u043e\u0439 \u043a\u043e\u0430\u043b\u0438\u0446\u0438\u0438, \u0443\u0441\u0438\u043b\u0438\u0432\u0430\u044f \u0434\u0435\u043b\u0438\u043a\u0430\u0442\u043d\u0443\u044e \u043f\u043e\u0437\u0438\u0446\u0438\u044e \u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d\u0430 \u0432 \u0431\u0430\u043b\u0430\u043d\u0441\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0438 \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u043e\u0432.<br/><br/>\u041c\u0435\u0436\u0434\u0443 \u0442\u0435\u043c, \u043e\u0442\u0447\u0430\u044f\u043d\u043d\u0430\u044f \u044d\u0441\u043a\u0430\u043b\u0430\u0446\u0438\u044f \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u043d\u043e\u0441\u0442\u0438 \u0432 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f\u0445 \u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d\u0430 \u0441 \u0410\u0444\u0433\u0430\u043d\u0438\u0441\u0442\u0430\u043d\u043e\u043c \u043c\u043e\u0436\u0435\u0442 \u0442\u0430\u043a\u0436\u0435 \u0441\u043b\u0443\u0436\u0438\u0442\u044c \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0446\u0435\u043b\u0438 \u2014 \u0441\u0438\u0433\u043d\u0430\u043b\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u0421\u0430\u0443\u0434\u043e\u0432\u0441\u043a\u043e\u0439 \u0410\u0440\u0430\u0432\u0438\u0438 \u043e \u0442\u043e\u043c, \u0447\u0442\u043e \u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d \u0443\u0436\u0435 \u0437\u0430\u043d\u044f\u0442 \u043d\u0430 \u0437\u0430\u043f\u0430\u0434\u043d\u043e\u043c \u0444\u0440\u043e\u043d\u0442\u0435 \u0438 \u043d\u0435 \u043c\u043e\u0436\u0435\u0442 \u0432\u0432\u044f\u0437\u044b\u0432\u0430\u0442\u044c\u0441\u044f \u0432 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442 \u0432 \u041f\u0435\u0440\u0441\u0438\u0434\u0441\u043a\u043e\u043c \u0437\u0430\u043b\u0438\u0432\u0435.", "text_plain": "\u041f\u0430\u043a\u0438\u0441\u0442\u0430\u043d - \u043e\u0431\u043e\u0440\u043e\u043d\u043d\u044b\u0439 \u043f\u0430\u043a\u0442 \u0441 \u0421\u0430\u0443\u0434\u043e\u0432\u0441\u043a\u043e\u0439 \u0410\u0440\u0430\u0432\u0438\u0435\u0439 \u0438 \u0432\u043e\u0439\u043d\u0430 \u043f\u0440\u043e\u0442\u0438\u0432 \u0418\u0440\u0430\u043d\u0430.  \u0412 \u043f\u043e\u0441\u043b\u0435\u0434\u043d\u0438\u0435 \u043d\u0435\u0434\u0435\u043b\u0438 \u0434\u0432\u0435 \u0432\u044b\u0441\u043e\u043a\u043e\u043f\u043e\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u043d\u044b\u0435 \u0434\u0435\u043b\u0435\u0433\u0430\u0446\u0438\u0438 \u0438\u0437 \u0418\u0441\u043b\u0430\u043c\u0430\u0431\u0430\u0434\u0430 \u043f\u043e\u0441\u0435\u0442\u0438\u043b\u0438 \u042d\u0440-\u0420\u0438\u04 \u043f\u0435\u0447\u0435\u043d\u0438\u044f Synapse \u0444\u0440\u0430\u043d\u0446\u0443\u0437\u0441\u043a\u043e\u0433\u043e \u0441\u0442\u0430\u0440\u0442\u0430\u043f\u0430 Look Up Space, \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u0438\u0437\u0438\u0440\u0443\u044e\u0449\u0435\u0433\u043e\u0441\u044f \u043d\u0430 \u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433\u0435 \u043a\u043e\u0441\u043c\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0442\u0440\u0430\u0444\u0438\u043a\u0430, \u0443 Amazon Leo \u0432\u0441\u0435\u0433\u043e 210 \u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432, \u0443 Qianfan (G60, \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0433\u043e Shanchai) \u2014 108, \u0443 OneWeb \u2014 651 \u0441\u043f\u0443\u0442\u043d\u0438\u043a, \u0430 \u0443 \u043a\u0438\u0442\u0430\u0439\u0441\u043a\u043e\u0439 \u043f\u0440\u0430\u0432\u0438\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432\u043a\u0438 Guowang \u2014 154.<br/><br/>\u041d\u0435\u043a\u043e\u0442\u043e\u0440\u044b\u0435 \u0438\u0433\u0440\u043e\u043a\u0438 \u043f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0430\u044e\u0442 \u0441\u0432\u043e\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u0435 \u043d\u0430 \u043e\u0431\u043e\u0440\u043e\u043d\u043d\u044b\u0439 \u0440\u044b\u043d\u043e\u043a, \u0447\u0435\u043c\u0443 \u0441\u043f\u043e\u0441\u043e\u0431\u0441\u0442\u0432\u0443\u0435\u0442 \u0436\u0435\u043b\u0430\u043d\u0438\u0435 \u043d\u0435\u043a\u043e\u0442\u043e\u0440\u044b\u0445 \u043f\u0440\u0430\u0432\u0438\u0442\u0435\u043b\u044c\u0441\u0442\u0432 \u0438\u0437\u0431\u0435\u0436\u0430\u0442\u044c \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438 \u043e\u0442 Starlink, \u043a\u043e\u0442\u043e\u0440\u044b\u0439 \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u0434\u0435\u0430\u043a\u0442\u0438\u0432\u0438\u0440\u043e\u0432\u0430\u043d \u043f\u043e \u0443\u0441\u043c\u043e\u0442\u0440\u0435\u043d\u0438\u044e \u0418\u043b\u043e\u043d\u0430 \u041c\u0430\u0441\u043a\u0430. \u042d\u0442\u043e \u043e\u0442\u043d\u043e\u0441\u0438\u0442\u0441\u044f \u0438 \u043a \u0413\u0435\u0440\u043c\u0430\u043d\u0438\u0438, \u0433\u0434\u0435 Rheinmetall \u0438 OHB \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0438\u043b\u0438\u0441\u044c \u0441 Airbus, \u0447\u0442\u043e\u0431\u044b \u043f\u0440\u0435\u0434\u043b\u043e\u0436\u0438\u0442\u044c \u0430\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0443 \u0434\u043b\u044f \u043d\u0435\u043c\u0435\u0446\u043a\u043e\u0433\u043e \u043e\u0431\u043e\u0440\u043e\u043d\u043d\u043e\u0433\u043e \u0441\u0435\u043a\u0442\u043e\u0440\u0430. \u0421\u043e\u0432\u0441\u0435\u043c \u043d\u0435\u0434\u0430\u0432\u043d\u043e \u043a\u0430\u043d\u0430\u0434\u0441\u043a\u043e\u0435 \u043c\u0438\u043d\u0438\u0441\u0442\u0435\u0440\u0441\u0442\u0432\u043e \u043e\u0431\u043e\u0440\u043e\u043d\u044b \u043f\u043e\u043b\u0443\u0447\u0438\u043b\u043e \u0432\u043e\u0437\u043c\u043e\u0436\u043d\u043e\u0441\u0442\u044c \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u044c 25% \u0447\u0430\u0441\u0442\u043e\u0442 (\u0434\u0438\u0430\u043f\u0430\u0437\u043e\u043d Ka) \u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432\u043e\u0439 \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432\u043a\u0438 Lightspeed \u043a\u043e\u043c\u043f\u0430\u043d\u0438\u0438 Telesat.", "text_plain": "\u0421 13 \u043c\u0430\u0440\u0442\u0430 \u043a\u043e\u043c\u043f\u0430\u043d\u0438\u044f SpaceX \u0438\u043c\u0435\u0435\u0442 \u043d\u0430 \u043e\u0440\u0431\u0438\u0442\u0435 \u0431\u043e\u043b\u0435\u0435 10000 \u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432 Starlink \u0434\u043b\u044f \u043f\u0440\u0435\u0434\u043e\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u0442\u0435\u043b\u0435\u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0445 \u0443\u0441\u043b\u0443\u0433 \u043d\u0430 \u043d\u0438\u0437\u043a\u043e\u0439 \u043e\u043a\u043e\u043b\u043e\u0437\u0435\u043c\u043d\u043e\u0439 \u043e\u0440\u0431\u0438\u0442\u0435. \u042d\u0442\u043e \u0441\u043e\u0441\u0442\u0430\u0432\u043b\u044f\u0435\u0442 \u043f\u043e\u0447\u0442\u0438 \u0434\u0432\u0435 \u0442\u0440\u0435\u0442\u0438 \u0438\u0437 15000 \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0449\u0438\u0445 \u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432, \u043d\u0430\u0445\u043e\u0434\u044f\u0449\u0438\u0445\u0441\u044f \u0432 \u043d\u0430\u0441\u0442\u043e\u044f\u0449\u0435\u0435 \u0432\u0440\u0435\u043c\u044f \u043d\u0430 \u043e\u0440\u0431\u0438\u0442\u0435 \u0417\u0435\u043c\u043b\u0438. \u0421\u0438\u0442\u0443\u0430\u0446\u0438\u044f \u043a\u0440\u0430\u0439\u043d\u0435 \u0434\u0438\u043d\u0430\u043c\u0438\u0447\u043d\u0430. \u041a\u0430\u043a \u043f\u043e \u0447\u0430\u0441\u043e\u0432\u043e\u0439 \u0441\u0442\u0440\u0435\u043b\u043a\u0435, SpaceX \u0432\u044b\u0432\u043e\u0434\u0438\u0442 \u043d\u0430 \u043e\u0440\u0431\u0438\u0442\u0443 \u043f\u0440\u0438\u043c\u0435\u0440\u043d\u043e 10 \u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432 Starlink \u0432 \u0434\u0435\u043d\u044c, \u0432\u0441\u0435\u0433\u043e \u0441 1 \u044f\u043d\u0432\u0430\u0440\u044f \u0438\u0445 \u043a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e \u0434\u043e\u0441\u0442\u0438\u0433\u043b\u043e 760, \u0442\u043e\u0447\u043d\u0435\u0435 780, \u0435\u0441\u043b\u0438 \u0432\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u0441\u0435\u0433\u043e\u0434\u043d\u044f\u0448\u043d\u0438\u0439 \u0437\u0430\u043f\u0443\u0441\u043a (\u0441\u0440\u0435\u0434\u0430, 18 \u043c\u0430\u0440\u0442\u0430)... 805 \u0441 \u0437\u0430\u043f\u0443\u0441\u043a\u043e\u043c \u0432 \u043f\u044f\u0442\u043d\u0438\u0446\u0443, 835 \u0441 \u0437\u0430\u043f\u0443\u0441\u043a\u043e\u043c \u0432 \u0432\u043e\u0441\u043a\u0440\u0435\u0441\u0435\u043d\u044c\u0435, 860 \u0432 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0432\u0442\u043e\u0440\u043d\u0438\u043a \u0438 \u0442\u0430\u043a \u0434\u0430\u043b\u0435\u0435. \u041a\u043e\u043d\u043a\u0443\u0440\u0438\u0440\u0443\u044e\u0449\u0438\u043c \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432\u043a\u0430\u043c \u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432 \u0435\u0449\u0435 \u043f\u0440\u0435\u0434\u0441\u0442\u043e\u0438\u0442 \u043f\u0440\u043e\u0439\u0442\u0438 \u0434\u043e\u043b\u0433\u0438\u0439 \u043f\u0443\u0442\u044c, \u0447\u0442\u043e\u0431\u044b \u0443\u043a\u0440\u0435\u043f\u0438\u0442\u044c \u0441\u0432\u043e\u0438 \u043f\u043e\u0437\u0438\u0446\u0438\u0438. \u0421\u043e\u0433\u043b\u0430\u0441\u043d\u043e \u0434\u0430\u043d\u043d\u044b\u043c \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u043d\u043e\u0433\u043e \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u044f Synapse \u0444\u0440\u0430\u043d\u0446\u0443\u0437\u0441\u043a\u043e\u0433\u043e \u0441\u0442\u0430\u0440\u0442\u0430\u043f\u0430 Look Up Space, \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u0438\u0437\u0438\u0440\u0443\u044e\u0449\u0435\u0433\u043e\u0441\u044f \u043d\u0430 \u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433\u0435 \u043a\u043e\u0441\u043c\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0442\u0440\u0430\u0444\u0438\u043a\u0430, \u0443 Amazon Leo \u0432\u0441\u0435\u0433\u043e 210 \u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0441\u043f\u0443\u0442\u043d\u0438\u043a\u043e\u0432, \u0443 Qianfan (G60, \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0433\u043e Shanchai) \u2014 108, \u0443 OneWeb \u2014 651 \u0441\u043f\u0443\u0442\u043d\u0438\u043a, \u0430 \u0443 \u043a\u0438\u0442\u0430\u0439\u0441\u043a\u043e\u0439 \u043f\u0440\u0430\u0432\u0438\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432 0\u0442\u043e\u043c\u043d\u043e\u0439 \u044d\u043b\u0435\u043a\u0442\u0440\u043e\u0441\u0442\u0430\u043d\u0446\u0438\u0438 \"\u0411\u0443\u0448\u0435\u0440\" \u043f\u0440\u0438\u0448\u0451\u043b\u0441\u044f \u043d\u0430 \u0443\u0447\u0430\u0441\u0442\u043e\u043a \u0440\u044f\u0434\u043e\u043c \u0441\u043e \u0437\u0434\u0430\u043d\u0438\u0435\u043c \u043c\u0435\u0442\u0440\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0441\u043b\u0443\u0436\u0431\u044b, \u0440\u0430\u0441\u043f\u043e\u043b\u043e\u0436\u0435\u043d\u043d\u044b\u043c \u043d\u0435\u043f\u043e\u0434\u0430\u043b\u0451\u043a\u0443 \u043e\u0442 \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0449\u0435\u0433\u043e \u044d\u043d\u0435\u0440\u0433\u043e\u0431\u043b\u043e\u043a\u0430. \u041a\u0430\u043a \u043e\u0442\u043c\u0435\u0442\u0438\u043b \u0433\u043b\u0430\u0432\u0430 \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\u0430\" \u0410\u043b\u0435\u043a\u0441\u0435\u0439 \u041b\u0438\u0445\u0430\u0447\u0435\u0432, \u044d\u0442\u043e \u043f\u0435\u0440\u0432\u044b\u0439 \u043f\u043e\u0434\u043e\u0431\u043d\u044b\u0439 \u0438\u043d\u0446\u0438\u0434\u0435\u043d\u0442 \u0441 \u043d\u0430\u0447\u0430\u043b\u0430 \u0431\u043e\u0435\u0432\u044b\u0445 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439. <br/>\u041f\u043e \u0435\u0433\u043e \u0441\u043b\u043e\u0432\u0430\u043c, \u0430\u0442\u0430\u043a\u0430 \u043f\u0440\u043e\u0438\u0437\u043e\u0448\u043b\u0430 \u0432 18:11 \u043f\u043e \u043c\u043e\u0441\u043a\u043e\u0432\u0441\u043a\u043e\u043c\u0443 \u0432\u0440\u0435\u043c\u0435\u043d\u0438, \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u0438 \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\u0430\" \u043d\u0435 \u043f\u043e\u0441\u0442\u0440\u0430\u0434\u0430\u043b\u0438, \u0430 \u0443\u0440\u043e\u0432\u0435\u043d\u044c \u0440\u0430\u0434\u0438\u0430\u0446\u0438\u0438 \u043d\u0430 \u0441\u0442\u0430\u043d\u0446\u0438\u0438 \u043e\u0441\u0442\u0430\u0451\u0442\u0441\u044f \u0432 \u043f\u0440\u0435\u0434\u0435\u043b\u0430\u0445 \u043d\u043e\u0440\u043c\u044b. \u0421\u0435\u0439\u0447\u0430\u0441 \u043d\u0430 \u043e\u0431\u044a\u0435\u043a\u0442\u0435 \u0440\u0430\u0431\u043e\u0442\u0430\u044e\u0442 \u043e\u043a\u043e\u043b\u043e 480 \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0445 \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u0438\u0441\u0442\u043e\u0432, \u0438 \u0433\u043e\u0442\u043e\u0432\u0438\u0442\u0441\u044f \u0442\u0440\u0435\u0442\u044c\u044f \u0432\u043e\u043b\u043d\u0430 \u044d\u0432\u0430\u043a\u0443\u0430\u0446\u0438\u0438 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u043b\u0430.<br/>\u0418\u0440\u0430\u043d\u0441\u043a\u0430\u044f \u041e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0430\u0442\u043e\u043c\u043d\u043e\u0439 \u044d\u043d\u0435\u0440\u0433\u0438\u0438 \u0442\u0430\u043a\u0436\u0435 \u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0434\u0438\u043b\u0430 \u0444\u0430\u043a\u0442 \u0430\u0442\u0430\u043a\u0438 \u043d\u0430 \u0410\u042d\u0421 \"\u0411\u0443\u0448\u0435\u0440\". \u041f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u0438\u0442\u0435\u043b\u0438 \u0430\u0433\u0435\u043d\u0442\u0441\u0442\u0432\u0430 \u0441\u043e\u043e\u0431\u0449\u0438\u043b\u0438, \u0447\u0442\u043e \u0440\u0430\u0437\u0440\u0443\u0448\u0435\u043d\u0438\u0439 \u0438 \u043f\u043e\u0441\u0442\u0440\u0430\u0434\u0430\u0432\u0448\u0438\u0445 \u043d\u0435\u0442, \u0432\u044b\u0440\u0430\u0437\u0438\u0432 \u043f\u0440\u043e\u0442\u0435\u0441\u0442 \u043f\u0440\u043e\u0442\u0438\u0432 \u043f\u043e\u0434\u043e\u0431\u043d\u044b\u0445 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439. <br/>\"\u0411\u0443\u0448\u0435\u0440\" \u2014 \u043f\u0435\u0440\u0432\u0430\u044f \u0430\u0442\u043e\u043c\u043d\u0430\u044f \u044d\u043b\u0435\u043a\u0442\u0440\u043e\u0441\u0442\u0430\u043d\u0446\u0438\u044f \u043d\u0435 \u0442\u043e\u043b\u044c\u043a\u043e \u0432 \u0418\u0440\u0430\u043d\u0435, \u043d\u043e \u0438 \u043d\u0430 \u0432\u0441\u0451\u043c \u0411\u043b\u0438\u0436\u043d\u0435\u043c \u0412\u043e\u0441\u0442\u043e\u043a\u0435. \u0415\u0451 \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u043e \u043d\u0430\u0447\u0430\u043b\u043e\u0441\u044c \u0435\u0449\u0451 \u0432 1975 \u0433\u043e\u0434\u0443, \u0430 \u043f\u043e\u0441\u043b\u0435 \u0434\u043e\u043b\u0433\u043e\u0433\u043e \u043f\u0435\u0440\u0435\u0440\u044b\u0432\u0430 \u0432\u043e\u0437\u043e\u0431\u043d\u043e\u0432\u0438\u043b\u043e\u0441\u044c \u0432 1995-\u043c \u043f\u0440\u0438 \u0443\u0447\u0430\u0441\u0442\u0438\u0438 \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\u0430\". \u041f\u0435\u0440\u0432\u044b\u0439 \u044d\u043d\u0435\u0440\u0433\u043e\u0431\u043b\u043e\u043a \u0410\u042d\u0421 \u0431\u044b\u043b \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0451\u043d \u043a \u0441\u0435\u0442\u0438 \u0432 \u0441\u0435\u043d\u0442\u044f\u0431\u0440\u0435 2011 \u0433\u043e\u0434\u0430, \u0430 \u0443\u0436\u0435 \u043b\u0435\u0442\u043e\u043c 2013-\u0433\u043e \u043d\u0430\u0447\u0430\u043b\u0430\u0441\u044c \u043f\u0440\u043e\u043c\u044b\u0448\u043b\u0435\u043d\u043d\u0430\u044f \u044d\u043a\u0441\u043f\u043b\u0443\u0430\u0442\u0430\u0446\u0438\u044f. \u0412 \u043d\u0430\u0441\u0442\u043e\u044f\u0449\u0435\u0435 \u0432\u0440\u0435\u043c\u044f \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442\u0441\u044f \u0432\u043e\u0437\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u0432\u0442\u043e\u0440\u043e\u0433\u043e \u044d\u043d\u0435\u0440\u0433\u043e\u0431\u043b\u043e\u043a\u0430, \u0437\u0430\u043a\u043b\u044e\u0447\u0451\u043d \u043a\u043e\u043d\u0442\u0440\u0430\u043a\u0442 \u0438 \u043d\u0430 \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u043e \u0442\u0440\u0435\u0442\u044c\u0435\u0433\u043e. \u041f\u043e\u0441\u043b\u0435 \u043d\u0430\u0447\u0430\u043b\u0430 \u043e\u043f\u0435\u0440\u0430\u0446\u0438\u0438 \u0421\u0428\u0410 \u0438 \u0418\u0437\u0440\u0430\u0438\u043b\u044f \u043f\u0440\u043e\u0442\u0438\u0432 \u0418\u0440\u0430\u043d\u0430 28 \u0444\u0435\u0432\u0440\u0430\u043b\u044f \u0432 \u0440\u0430\u0439\u043e\u043d\u0435 \u0411\u0443\u0448\u0435\u0440\u0430 \u043f\u0440\u043e\u0433\u0440\u0435\u043c\u0435\u043b\u0438 \u0432\u0437\u0440\u044b\u0432\u044b. \u0412 \u0442\u043e\u0442 \u0436\u0435 \u0434\u0435\u043d\u044c \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\" \u0432\u044b\u0432\u0435\u0437 \u0438\u0437 \u0441\u0442\u0440\u0430\u043d\u044b \u0434\u0435\u0442\u0435\u0439 \u0438 \u0447\u0430\u0441\u0442\u044c \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u043e\u0432, \u0432\u0441\u0435\u0433\u043e \u2014 94 \u0447\u0435\u043b\u043e\u0432\u0435\u043a\u0430, \u0430 12 \u043c\u0430\u0440\u0442\u0430 \u044d\u0432\u0430\u043a\u0443\u0438\u0440\u043e\u0432\u0430\u043b \u0435\u0449\u0451 150 \u0440\u043e\u0441\u0441\u0438\u044f\u043d.<br/>\u041e\u0441\u043d\u043e\u0432\u043d\u044b\u0435 \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u0440\u0430\u0431\u043e\u0442\u044b \u043d\u0430 \u043e\u0431\u044a\u0435\u043a\u0442\u0435 \u043f\u0440\u0438\u043e\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u044b, \u043d\u043e, \u043f\u043e \u0441\u043b\u043e\u0432\u0430\u043c \u041b\u0438\u0445\u0430\u0447\u0435\u0432\u0430, \"\u0443\u0445\u043e\u0434\u0438\u0442\u044c \u043e\u0442\u0442\u0443\u0434\u0430 \u0442\u043e\u0447\u043d\u043e \u043d\u0435 \u0432\u0440\u0435\u043c\u044f\". \u041e\u043d \u043e\u0442\u043c\u0435\u0442\u0438\u043b, \u0447\u0442\u043e \u043f\u0440\u0435\u0437\u0438\u0434\u0435\u043d\u0442 \u0412\u043b\u0430\u0434\u0438\u043c\u0438\u0440 \u041f\u0443\u0442\u0438\u043d \u0434\u0435\u0440\u0436\u0438\u0442 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044e \u043f\u043e\u0434 \u043b\u0438\u0447\u043d\u044b\u043c \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u0435\u043c \u0438 \u043f\u0440\u0435\u0434\u043f\u0440\u0438\u043d\u0438\u043c\u0430\u0435\u0442 \u043c\u0435\u0440\u044b \u0434\u043b\u044f \u0437\u0430\u0449\u0438\u0442\u044b \u0441\u0442\u0430\u043d\u0446\u0438\u0438 \u0438 \u043b\u044e\u0434\u0435\u0439. \u0418\u0437\u0440\u0430\u0438\u043b\u044c\u0441\u043a\u0438\u0439 \u043f\u043e\u0441\u043e\u043b \u0432 \u041c\u043e\u0441\u043a\u0432\u0435 \u041e\u0434\u0435\u0434 \u0419\u043e\u0441\u0435\u0444, \u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u0443\u044f \u0438\u043d\u0446\u0438\u0434\u0435\u043d\u0442, \u0437\u0430\u044f\u0432\u0438\u043b, \u0447\u0442\u043e \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u0438\u0437\u0440\u0430\u0438\u043b\u044c\u0441\u043a\u0438\u0445 \u0432\u043e\u0435\u043d\u043d\u044b\u0445 \u043f\u0440\u043e\u0434\u0443\u043c\u0430\u043d\u044b \u0438 \u0443\u0447\u0438\u0442\u044b\u0432\u0430\u044e\u0442 \u043e\u0437\u0430\u0431\u043e\u0447\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0420\u043e\u0441\u0441\u0438\u0438 \u043e\u0442\u043d\u043e\u0441\u0438\u0442\u0435\u043b\u044c\u043d\u043e \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u0438 \u0410\u042d\u0421.", "text_plain": "\u0423\u0434\u0430\u0440 \u043f\u043e \u0438\u0440\u0430\u043d\u0441\u043a\u043e\u0439 \u0430\u0442\u043e\u043c\u043d\u043e\u0439 \u044d\u043b\u0435\u043a\u0442\u0440\u043e\u0441\u0442\u0430\u043d\u0446\u0438\u0438 \"\u0411\u0443\u0448\u0435\u0440\" \u043f\u0440\u0438\u0448\u0451\u043b\u0441\u044f \u043d\u0430 \u0443\u0447\u0430\u0441\u0442\u043e\u043a \u0440\u044f\u0434\u043e\u043c \u0441\u043e \u0437\u0434\u0430\u043d\u0438\u0435\u043c \u043c\u0435\u0442\u0440\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0441\u043b\u0443\u0436\u0431\u044b, \u0440\u0430\u0441\u043f\u043e\u043b\u043e\u0436\u0435\u043d\u043d\u044b\u043c \u043d\u0435\u043f\u043e\u0434\u0430\u043b\u0451\u043a\u0443 \u043e\u0442 \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0449\u0435\u0433\u043e \u044d\u043d\u0435\u0440\u0433\u043e\u0431\u043b\u043e\u043a\u0430. \u041a\u0430\u043a \u043e\u0442\u043c\u0435\u0442\u0438\u043b \u0433\u043b\u0430\u0432\u0430 \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\u0430\" \u0410\u043b\u0435\u043a\u0441\u0435\u0439 \u041b\u0438\u0445\u0430\u0447\u0435\u0432, \u044d\u0442\u043e \u043f\u0435\u0440\u0432\u044b\u0439 \u043f\u043e\u0434\u043e\u0431\u043d\u044b\u0439 \u0438\u043d\u0446\u0438\u0434\u0435\u043d\u0442 \u0441 \u043d\u0430\u0447\u0430\u043b\u0430 \u0431\u043e\u0435\u0432\u044b\u0445 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439.  \u041f\u043e \u0435\u0433\u043e \u0441\u043b\u043e\u0432\u0430\u043c, \u0430\u0442\u0430\u043a\u0430 \u043f\u0440\u043e\u0438\u0437\u043e\u0448\u043b\u0430 \u0432 18:11 \u043f\u043e \u043c\u043e\u0441\u043a\u043e\u0432\u0441\u043a\u043e\u043c\u0443 \u0432\u0440\u0435\u043c\u0435\u043d\u0438, \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u0438 \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\u0430\" \u043d\u0435 \u043f\u043e\u0441\u0442\u0440\u0430\u0434\u0430\u043b\u0438, \u0430 \u0443\u0440\u043e\u0432\u0435\u043d\u044c \u0440\u0430\u0434\u0438\u0430\u0446\u0438\u0438 \u043d\u0430 \u0441\u0442\u0430\u043d\u0446\u0438\u0438 \u043e\u0441\u0442\u0430\u0451\u0442\u0441\u044f \u0432 \u043f\u0440\u0435\u0434\u0435\u043b\u0430\u0445 \u043d\u043e\u0440\u043c\u044b. \u0421\u0435\u0439\u0447\u0430\u0441 \u043d\u0430 \u043e\u0431\u044a\u0435\u043a\u0442\u0435 \u0440\u0430\u0431\u043e\u0442\u0430\u044e\u0442 \u043e\u043a\u043e\u043b\u043e 480 \u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0445 \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u0438\u0441\u0442\u043e\u0432, \u0438 \u0433\u043e\u0442\u043e\u0432\u0438\u0442\u0441\u044f \u0442\u0440\u0435\u0442\u044c\u044f \u0432\u043e\u043b\u043d\u0430 \u044d\u0432\u0430\u043a\u0443\u0430\u0446\u0438\u0438 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u043b\u0430. \u0418\u0440\u0430\u043d\u0441\u043a\u0430\u044f \u041e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0430\u0442\u043e\u043c\u043d\u043e\u0439 \u044d\u043d\u0435\u0440\u0433\u0438\u0438 \u0442\u0430\u043a\u0436\u0435 \u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0434\u0438\u043b\u0430 \u0444\u0430\u043a\u0442 \u0430\u0442\u0430\u043a\u0438 \u043d\u0430 \u0410\u042d\u0421 \"\u0411\u0443\u0448\u0435\u0440\". \u041f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u0438\u0442\u0435\u043b\u0438 \u0430\u0433\u0435\u043d\u0442\u0441\u0442\u0432\u0430 \u0441\u043e\u043e\u0431\u0449\u0438\u043b\u0438, \u0447\u0442\u043e \u0440\u0430\u0437\u0440\u0443\u0448\u0435\u043d\u0438\u0439 \u0438 \u043f\u043e\u0441\u0442\u0440\u0430\u0434\u0430\u0432\u0448\u0438\u0445 \u043d\u0435\u0442, \u0432\u044b\u0440\u0430\u0437\u0438\u0432 \u043f\u0440\u043e\u0442\u0435\u0441\u0442 \u043f\u0440\u043e\u0442\u0438\u0432 \u043f\u043e\u0434\u043e\u0431\u043d\u044b\u0445 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439.  \"\u0411\u0443\u0448\u0435\u0440\" \u2014 \u043f\u0435\u0440\u0432\u0430\u044f \u0430\u0442\u043e\u043c\u043d\u0430\u044f \u044d\u043b\u0435\u043a\u0442\u0440\u043e\u0441\u0442\u0430\u043d\u0446\u0438\u044f \u043d\u0435 \u0442\u043e\u043b\u044c\u043a\u043e \u0432 \u0418\u0440\u0430\u043d\u0435, \u043d\u043e \u0438 \u043d\u0430 \u0432\u0441\u0451\u043c \u0411\u043b\u0438\u0436\u043d\u0435\u043c \u0412\u043e\u0441\u0442\u043e\u043a\u0435. \u0415\u0451 \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u043e \u043d\u0430\u0447\u0430\u043b\u043e\u0441\u044c \u0435\u0449\u0451 \u0432 1975 \u0433\u043e\u0434\u0443, \u0430 \u043f\u043e\u0441\u043b\u0435 \u0434\u043e\u043b\u0433\u043e\u0433\u043e \u043f\u0435\u0440\u0435\u0440\u044b\u0432\u0430 \u0432\u043e\u0437\u043e\u0431\u043d\u043e\u0432\u0438\u043b\u043e\u0441\u044c \u0432 1995-\u043c \u043f\u0440\u0438 \u0443\u0447\u0430\u0441\u0442\u0438\u0438 \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\u0430\". \u041f\u0435\u0440\u0432\u044b\u0439 \u044d\u043d\u0435\u0440\u0433\u043e\u0431\u043b\u043e\u043a \u0410\u042d\u0421 \u0431\u044b\u043b \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0451\u043d \u043a \u0441\u0435\u0442\u0438 \u0432 \u0441\u0435\u043d\u0442\u044f\u0431\u0440\u0435 2011 \u0433\u043e\u0434\u0430, \u0430 \u0443\u0436\u0435 \u043b\u0435\u0442\u043e\u043c 2013-\u0433\u043e \u043d\u0430\u0447\u0430\u043b\u0430\u0441\u044c \u043f\u0440\u043e\u043c\u044b\u0448\u043b\u0435\u043d\u043d\u0430\u044f \u044d\u043a\u0441\u043f\u043b\u0443\u0430\u0442\u0430\u0446\u0438\u044f. \u0412 \u043d\u0430\u0441\u0442\u043e\u044f\u0449\u0435\u0435 \u0432\u0440\u0435\u043c\u044f \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442\u0441\u044f \u0432\u043e\u0437\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u0432\u0442\u043e\u0440\u043e\u0433\u043e \u044d\u043d\u0435\u0440\u0433\u043e\u0431\u043b\u043e\u043a\u0430, \u0437\u0430\u043a\u043b\u044e\u0447\u0451\u043d \u043a\u043e\u043d\u0442\u0440\u0430\u043a\u0442 \u0438 \u043d\u0430 \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u043e \u0442\u0440\u0435\u0442\u044c\u0435\u0433\u043e. \u041f\u043e\u0441\u043b\u0435 \u043d\u0430\u0447\u0430\u043b\u0430 \u043e\u043f\u0435\u0440\u0430\u0446\u0438\u0438 \u0421\u0428\u0410 \u0438 \u0418\u0437\u0440\u0430\u0438\u043b\u044f \u043f\u0440\u043e\u0442\u0438\u0432 \u0418\u0440\u0430\u043d\u0430 28 \u0444\u0435\u0432\u0440\u0430\u043b\u044f \u0432 \u0440\u0430\u0439\u043e\u043d\u0435 \u0411\u0443\u0448\u0435\u0440\u0430 \u043f\u0440\u043e\u0433\u0440\u0435\u043c\u0435\u043b\u0438 \u0432\u0437\u0440\u044b\u0432\u044b. \u0412 \u0442\u043e\u0442 \u0436\u0435 \u0434\u0435\u043d\u044c \"\u0420\u043e\u0441\u0430\u0442\u043e\u043c\" \u0432\u044b\u0432\u0435\u0437 \u0438\u0437 \u0441\u0442\u0440\u0430\u043d\u044b \u0434\u0435\u0442\u0435\u0439 \u0438 \u0447\u0430\u0441\u0442\u044c \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u043e\u0432, \u0432\u0441\u0435\u0433\u043e \u2014 94 \u0447\u0435\u043b\u043e\u0432\u0435\u043a\u0430, \u0430 12 \u043c\u0430\u0440\u0442\u0430 \u044d\u0432\u0430\u043a\u0443\u0438\u0440\u043e\u0432\u0430\u043b \u0435\u0449\u0451 150 \u0440\u043e\u0441\u0441\u0438\u044f\u043d. \u041e\u0441\u043d\u043e\u0432\u043d\u044b\u0435 \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u0440\u0430\u0431\u043e\u0442\u044b \u043d\u0430 \u043e\u0431\u044a\u0435\u043a\u0442\u0435 \u043f\u0440\u0438\u043e\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u044b, \u043d\u043e, \u043f\u043e \u0441\u043b\u043e\u0432\u0430\u043c \u041b\u0438\u0445\u0430\u0447\u0435\u0432\u0430, \"\u0443\u0445\u043e\u0434\u0438\u0442\u044c \u043e\u0442\u0442\u0443\u0434\u0430 \u0442\u043e\u0447\u043d\u043e \u043d\u0435 \u0432\u0440\u0435\u043c\u044f\". \u041e\u043d \u043e\u0442\u043c\u0435\u0442\u0438\u043b, \u0447\u0442\u043e \u043f\u0440\u0435\u0437\u0438\u0434\u0435\u043d\u0442 \u0412\u043b\u0430\u0434\u0438\u043c\u0438\u0440 \u041f\u0443\u0442\u0438\u043d \u0434\u0435\u0440\u0436\u0438\u0442 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044e \u043f\u043e\u0434 \u043b\u0438\u0447\u043d\u044b\u043c \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u0435\u043c \u0438 \u043f\u0440\u0435\u0434\u043f\u0440\u0438\u043d\u0438\u043c\u0430\u0435\u0442 \u043c\u0435\u0440\u044b \u0434\u043b\u044f \u0437\u0430\u0449\u0438\u0442\u044b \u0441\u0442\u0430\u043d\u0446\u0438\u0438 \u0438 \u043b\u044e\u0434\u0435\u0439. \u0418\u0437\u0440\u0430\u0438\u043b\u044c\u0441\u043a\u0438\u0439 \u043f\u043e\u0441\u043e\u043b \u0432 \u041c\u043e\u0441\u043a\u0432\u0435 \u041e\u0434\u0435\u0434 \u0419\u043e\u0441\u0435\u0444, \u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0438\u0440\u0443\u044f \u0438\u043d\u0446\u0438\u0434\u0435\u043d\u0442, \u0437\u0430\u044f\u0432\u0438\u043b, \u0447\u0442\u043e \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u0438\u0437\u0440\u0430\u0438\u043b\u044c\u0441\u043a\u0438\u0445 \u0432\u043e\u0435\u043d\u043d\u044b\u0445 \u043f\u0440\u043e\u0434\u0443\u043c\u0430\u043d\u044b \u0438 \u0443\u0447\u0438\u0442\u044b\u0432\u0430\u044e\u0442 \u043e\u0437\u0430\u0431\u043e\u0447\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0420\u043e\u0441\u0441\u0438\u0438 \u043e\ u0430\u0436\u0434\u044b\u0439 \u0434\u0435\u043d\u044c. \u0412\u043a\u0430\u043b\u044b\u0432\u0430\u0435\u0442 \u043f\u043e \u0442\u0440\u0438 \u0447\u0430\u0441\u0430, \u0438 \u043d\u0435 \u0436\u0430\u043b\u0435\u044f \u0441\u0435\u0431\u044f. \u041e\u0437\u0430\u0434\u0430\u0447\u0438\u043b\u0441\u044f \u043f\u043e\u0438\u0441\u043a\u043e\u043c \u0442\u043e\u043b\u043a\u043e\u0432\u043e\u0439 \u043f\u0440\u0438\u043a\u043e\u0440\u043c\u043a\u0438, \u0447\u0442\u043e\u0431\u044b \u0434\u0443\u0445 \u043d\u0435 \u043f\u0430\u0434\u0430\u043b, \u0438 \u0442\u0435\u043b\u043e \u0436\u0438\u043b\u043e \u043f\u043e\u043b\u043d\u043e\u0446\u0435\u043d\u043d\u044b\u0439 \u0440\u0430\u0431\u043e\u0447\u0438\u0439 \u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0432\u044b\u0439 \u0434\u0435\u043d\u044c. <br/><br/>\u0418\u0441\u043a\u0430\u043b\u0438, \u0447\u0438\u0442\u0430\u043b\u0438, \u0440\u0435\u0448\u0438\u043b\u0438 \u0432\u044b\u0431\u0440\u0430\u0442\u044c \u0441\u0440\u0435\u0434\u0438 \u0441\u0432\u043e\u0438\u0445, \u043a\u0442\u043e \u0437\u043d\u0430\u0435\u0442 \u043a\u0430\u043a\u0430\u044f \u043f\u044b\u043b\u044c \u0443 \u0437\u0430\u0433\u0440\u0430\u043d\u0438\u0447\u043d\u044b\u0445. \u0412\u0437\u044f\u043b\u0438 \u043d\u0430 \u0442\u0435\u0441\u0442 MindBooster - \u0433\u043e\u0442\u043e\u0432\u044b\u0439 \u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0441 \u0434\u043b\u044f \u0443\u043b\u0443\u0447\u0448\u0435\u043d\u0438\u044f \u043c\u043e\u0437\u0433\u043e\u0432\u043e\u0439 \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438, \u0447\u0442\u043e\u0431\u044b \u043b\u0435\u0433\u0447\u0435 \u0432\u043a\u043b\u044e\u0447\u0430\u0442\u044c\u0441\u044f \u0432 \u0440\u0430\u0431\u043e\u0442\u0443 \u0438 \u043d\u0435 \u0442\u0435\u0440\u044f\u0442\u044c \u0441\u0438\u043b\u044b \u043a \u0432\u0435\u0447\u0435\u0440\u0443. \u0423\u0436\u0435 \u043a\u043e\u0442\u043e\u0440\u044b\u0439 \u043c\u0435\u0441\u044f\u0446 \u043d\u0430 \u043d\u0435\u043c \u0441\u0438\u0434\u0438\u043c \u0438 \u0432\u0441\u0435 \u043d\u0440\u0430\u0432\u0438\u0442\u0441\u044f.<br/><br/>\u0411\u0435\u0437 \u043b\u0438\u0448\u043d\u0435\u0433\u043e \u0445\u043b\u0430\u043c\u0430: \u0442\u0443\u0442 10 \u043a\u043e\u043c\u043f\u043e\u043d\u0435\u043d\u0442\u043e\u0432, \u044d\u0444\u0444\u0435\u043a\u0442 \u043e\u0442 \u043a\u043e\u0442\u043e\u0440\u044b\u0445 \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u0447\u0443\u0432\u0441\u0442\u0432\u0443\u0435\u0442\u0441\u044f. \u0427\u0435\u0440\u0435\u0437 \u0447\u0430\u0441 \u043f\u043e\u0441\u043b\u0435 \u043f\u0440\u0438\u0451\u043c\u0430 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0448\u044c\u0441\u044f \u0432 \u0440\u0430\u0431\u043e\u0442\u0443. \u041d\u0430 \u0432\u0442\u043e\u0440\u0443\u044e \u043d\u0435\u0434\u0435\u043b\u044e \u0437\u0430\u043c\u0435\u0442\u0438\u043b\u0438, \u0447\u0442\u043e \u0441\u043d\u0438\u0436\u0430\u0435\u0442\u0441\u044f \u0443\u0441\u0442\u0430\u043b\u043e\u0441\u0442\u044c \u0438 \u043f\u043e\u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u044f\u0441\u043d\u043e\u0441\u0442\u044c \u0432 \u0433\u043e\u043b\u043e\u0432\u0435. \u0421\u0442\u0430\u043b\u043e \u043b\u0435\u0433\u0447\u0435 \u0441\u043f\u0440\u0430\u0432\u043b\u044f\u0442\u044c\u0441\u044f \u0441 \u043d\u0430\u0433\u0440\u0443\u0437\u043a\u0430\u043c\u0438.<br/><br/>\u042d\u043d\u0435\u0440\u0433\u0435\u0442\u0438\u043a\u0438 \u0434\u0440\u044f\u043d\u044c, \u0441\u0430\u0434\u044f\u0442 \u043f\u0435\u0447\u0435\u043d\u044c, \u0430 MindBooster - \u044d\u0442\u043e \u0438\u043c\u0435\u043d\u043d\u043e \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 \u043d\u0435\u0440\u0432\u043d\u043e\u0439 \u0441\u0438\u0441\u0442\u0435\u043c\u044b \u0438 \u0432\u044b\u043d\u043e\u0441\u043b\u0438\u0432\u043e\u0441\u0442\u0438. \u041e\u043d \u043d\u0435 \u0441\u0442\u0438\u043c\u0443\u043b\u0438\u0440\u0443\u0435\u0442 \u0438\u0441\u043a\u0443\u0441\u0441\u0442\u0432\u0435\u043d\u043d\u043e, \u0430 \u0434\u0430\u0451\u0442 \u0442\u043e\u043f\u043b\u0438\u0432\u043e \u0434\u043b\u044f \u043f\u043e\u043b\u043d\u043e\u0446\u0435\u043d\u043d\u043e\u0439 \u0440\u0430\u0431\u043e\u0442\u044b. \u041f\u043b\u044e\u0441 \u043e\u0441\u0442\u0430\u044e\u0442\u0441\u044f \u0441\u0438\u043b\u044b \u043d\u0430 \u043d\u043e\u0440\u043c\u0430\u043b\u044c\u043d\u044b\u0439 \u043e\u0442\u0434\u044b\u0445 \u0432 \u043a\u043e\u043d\u0446\u0435 \u0434\u043d\u044f. \u0411\u0438\u043d\u0433\u043e!<br/><br/>\u0415\u0441\u043b\u0438 \u0445\u043e\u0442\u0438\u0442\u0435 \u0441\u043f\u0440\u0430\u0432\u043b\u044f\u0442\u044c\u0441\u044f \u0441 \u043d\u0430\u0433\u0440\u0443\u0437\u043a\u0430\u043c\u0438 \u043b\u0435\u0433\u0447\u0435 \u0438 \u044d\u0444\u0444\u0435\u043a\u0442\u0438\u0432\u043d\u0435\u0435 - \u0440\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0443\u0435\u043c \u043f\u043e\u043f\u0440\u043e\u0431\u043e\u0432\u0430\u0442\u044c \u0438 \u0443\u0431\u0435\u0434\u0438\u0442\u044c\u0441\u044f \u043b\u0438\u0447\u043d\u043e.<br/><br/>\u0423 \u043f\u0440\u043e\u0438\u0437\u0432\u043e\u0434\u0438\u0442\u0435\u043b\u044f \u0435\u0449\u0435 \u043c\u043d\u043e\u0433\u043e \u0440\u0430\u0437\u043d\u044b\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0445 \u0432\u0438\u0442\u0430\u043c\u0438\u043d\u043e\u0432 \u043f\u043e\u0434 \u0440\u0430\u0437\u043d\u044b\u0435 \u0437\u0430\u0434\u0430\u0447\u0438.<br/>\u0411\u0440\u0430\u0442\u044c \u0443\u0434\u043e\u0431\u043d\u0435\u0435 \u043d\u0430 OZON:<br/><i class=\"emoji\" style=\"background-image:url('//telegram.org/img/emoji/40/F09F9189.png')\"><b>\ud83d\udc49</b></i><a href=\"https://ozon.ru/product/mindbooster-nooteria-labs-bad-dlya-golovnogo-mozga-nootrop-dlya-pamyati-vnimaniya-i-energii-kapsuly-266784115/?hs=1&amp;amp;utm_source=influencer&amp;amp;utm_medium=condottiero&amp;amp;utm_campaign=vendor_org_132218_0326\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\" rel=\"noopener\" target=\"_blank\">\u0441\u0441\u044b\u043b\u043a\u0430 \u043d\u0430 \u043c\u0430\u0433\u0430\u0437\u0438\u043d \u043f\u0440\u043e\u0438\u0437\u0432\u043e\u0434\u0438\u0442\u0435\u043b\u044f</a>", "text_plain": "\u041a\u0430\u043c\u0440\u0430\u0434\u044b, \u0447\u0442\u043e \u043d\u0430\u0448\u0435\u043b!  \u0412\u0440\u0435\u043c\u0435\u043d\u0430 \u0442\u044f\u0436\u0435\u043b\u044b\u0435 \u0441\u0435\u0439\u0447\u0430\u0441, \u043d\u043e \u0432\u0435\u0442\u0435\u0440\u0430\u043d \u043d\u0430 \u0441\u043f\u043e\u0440\u0442\u0435 \u043a\u0430\u0436\u0434\u044b\u0439 \u0434\u0435\u043d\u044c. \u0412\u043a\u0430\u043b\u044b\u0432\u0430\u0435\u0442 \u043f\u043e \u0442\u0440\u0438 \u0447\u0430\u0441\u0430, \u0438 \u043d\u0435 \u0436\u0430\u043b\u0435\u044f \u0441\u0435\u0431\u044f. \u041e\u0437\u0430\u0434\u0430\u0447\u0438\u043b\u0441\u044f \u043f\u043e\u0438\u0441\u043a\u043e\u043c \u0442\u043e\u043b\u043a\u043e\u0432\u043e\u0439 \u043f\u0440\u0438\u043a\u043e\u0440\u043c\u043a\u0438, \u0447\u0442\u043e\u0431\u044b \u0434\u0443\u0445 \u043d\u0435 \u043f\u0430\u0434\u0430\u043b, \u0438 \u0442\u0435\u043b\u043e \u0436\u0438\u043b\u043e \u043f\u043e\u043b\u043d\u043e\u0446\u0435\u043d\u043d\u044b\u0439 \u0440\u0430\u0431\u043e\u0447\u0438\u0439 \u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0432\u044b\u0439 \u0434\u0435\u043d\u044c.  \u0418\u0441\u043a\u0430\u043b\u0438, \u0447\u0438\u0442\u0430\u043b\u0438, \u0440\u0435\u0448\u0438\u043b\u0438 \u0432\u044b\u0431\u0440\u0430\u0442\u044c \u0441\u0440\u0435\u0434\u0438 \u0441\u0432\u043e\u0438\u0445, \u043a\u0442\u043e \u0437\u043d\u0430\u0435\u0442 \u043a\u0430\u043a\u0430\u044f \u043f\u044b\u043b\u044c \u0443 \u0437\u0430\u0433\u0440\u0430\u043d\u0438\u0447\u043d\u044b\u0445. \u0412\u0437\u044f\u043b\u0438 \u043d\u0430 \u0442\u0435\u0441\u0442 MindBooster - \u0433\u043e\u0442\u043e\u0432\u044b\u0439 \u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0441 \u0434\u043b\u044f \u0443\u043b\u0443\u0447\u0448\u0435\u043d\u0438\u044f \u043c\u043e\u0437\u0433\u043e\u0432\u043e\u0439 \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438, \u0447\u0442\u043e\u0431\u044b \u043b\u0435\u0433\u0447\u0435 \u0432\u043a\u043b\u044e\u0447\u0430\u0442\u044c\u0441\u044f \u0432 \u0440\u0430\u0431\u043e\u0442\u0443 \u0438 \u043d\u0435 \u0442\u0435\u0440\u044f\u0442\u044c \u0441\u0438\u043b\u044b \u043a \u0432\u0435\u0447\u0435\u0440\u0443. \u0423\u0436\u0435 \u043a\u043e\u0442\u043e\u0440\u044b\u0439 \u043c\u0435\u0441\u044f\u0446 \u043d\u0430 \u043d\u0435\u043c \u0441\u0438\u0434\u0438\u043c \u0438 \u0432\u0441\u0435 \u043d\u0440\u0430\u0432\u0438\u0442\u0441\u044f. \u0411\u0435\u0437 \u043b\u0438\u0448\u043d\u0435\u0433\u043e \u0445\u043b\u0430\u043c\u0430: \u0442\u0443\u0442 10 \u043a\u043e\u043c\u043f\u043e\u043d\u0435\u043d\u0442\u043e\u0432, \u044d\u0444\u0444\u0435\u043a\u0442 \u043e\u0442 \u043a\u043e\u0442\u043e\u0440\u044b\u0445 \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u0447\u0443\u0432\u0441\u0442\u0432\u0443\u0435\u0442\u0441\u044f. \u0427\u0435\u0440\u0435\u0437 \u0447\u0430\u0441 \u043f\u043e\u0441\u043b\u0435 \u043f\u0440\u0438\u0451\u043c\u0430 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0448\u044c\u0441\u044f \u0432 \u0440\u0430\u0431\u043e\u0442\u0443. \u041d\u0430 \u0432\u0442\u043e\u0440\u0443\u044e \u043d\u0435\u0434\u0435\u043b\u044e \u0437\u0430\u043c\u0435\u0442\u0438\u043b\u0438, \u0447\u0442\u043e \u0441\u043d\u0438\u0436\u0430\u0435\u0442\u0441\u044f \u0443\u0441\u0442\u0430\u043b\u043e\u0441\u0442\u044c \u0438 \u043f\u043e\u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u044f\u0441\u043d\u043e\u0441\u0442\u044c \u0432 \u0433\u043e\u043b\u043e\u0432\u0435. \u0421\u0442\u0430\u043b\u043e \u043b\u0435\u0433\u0447\u0435 \u0441\u043f\u0440\u0430\u0432\u043b\u044f\u0442\u044c\u0441\u044f \u0441 \u043d\u0430\u0433\u0440\u0443\u0437\u043a\u0430\u043c\u0438. \u042d\u043d\u0435\u0440\u0433\u0435\u0442\u0438\u043a\u0438 \u0434\u0440\u044f\u043d\u044c, \u0441\u0430\u0434\u044f\u0442 \u043f\u0435\u0447\u0435\u043d\u044c, \u0430 MindBooster - \u044d\u0442\u043e \u0438\u043c\u0435\u043d\u043d\u043e \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 \u043d\u0435\u0440\u0432\u043d\u043e\u0439 \u0441\u0438\u0441\u0442\u0435\u043c\u044b \u0438 \u0432\u044b\u043d\u043e\u0441\u043b\u0438\u0432\u043e\u0441\u0442\u0438. \u041e\u043d \u043d\u0435 \u0441\u0442\u0438\u043c\u0443\u043b\u0438\u0440\u0443\u0435\u0442 \u0438\u0441\u043a\u0443\u0441\u0441\u0442\u0432\u0435\u043d\u043d\u043e, \u0430 \u0434\u0430\u0451\u0442 \u0442\u043e\u043f\u043b\u0438\u0432\u043e \u0434\u043b\u044f \u043f\u043e\u043b\u043d\u043e\u0446\u0435\u043d\u043d\u043e\u0439 \u0440\u0430\u0431\u043e\u0442\u044b. \u041f\u043b\u044e\u0441 \u043e\u0441\u0442\u0430\u044e\u0442\u0441\u044f \u0441\u0438\u043b\u044b \u043d\u0430 \u043d\u043e\u0440\u043c\u0430\u043b\u044c\u043d\u044b\u0439 \u043e\u0442\u0434\u044b\u0445 \u0432 \u043a\u043e\u043d\u0446\u0435 \u0434\u043d\u044f. \u0411\u0438\u043d\u0433\u043e! \u0415\u0441\u043b\u0438 \u0445\u043e\u0442\u0438\u0442\u0435 \u0441\u043f\u0440\u0430\u0432\u043b\u044f\u0442\u044c\u0441\u044f \u0441 \u043d\u0430\u0433\u0440\u0443\u0437\u043a\u0430\u043c\u0438 \u043b\u0435\u0433\u0447\u0435 \u0438 \u044d\u0444\u0444\u0435\u043a\u0442\u0438\u0432\u043d\u0435\u0435 - \u0440\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0443\u0435\u043c \u043f\u043e\u043f\u0440\u043e\u0431\u043e\u0432\u0430\u0442\u044c \u0438 \u0443\u0431\u0435\u0434\u0438\u0442\u044c\u0441\u044f \u043b\u0438\u0447\u043d\u043e. \u0423 \u043f\u0440\u043e\u0438\u0437\u0432\u043e\u0434\u0438\u0442\u0435\u043b\u044f \u0435\u0449\u0435 \u043c\u043d\u043e\u0433\u043e \u0440\u0430\u0437\u043d\u044b\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0445 \u0432\u0438\u0442\u0430\u043c\u0438\u043d\u043e\u0432 \u043f\u043e\u0434 \u0440\u0430\u0437\u043d\u044b\u0435 \u0437\u0430\u0434\u0430\u0447\u0438. \u0411\u0440\u0430\u0442\u044c \u0443\u0434\u043e\u0431\u043d\u0435\u0435 \u043d\u0430 OZON: \ud83d\ud
